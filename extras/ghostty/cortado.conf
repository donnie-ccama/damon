# Optional Ghostty presentation profile for Cortado.
# Copy the theme beside your Ghostty themes, then include these settings in
# your Ghostty config. Font-family is intentionally left to the user.
theme = Cortado Night
font-size = 14
window-padding-x = 10
window-padding-y = 8
window-padding-balance = true
background-opacity = 0.96
background-blur = 18
macos-titlebar-style = transparent
macos-window-buttons = visible
